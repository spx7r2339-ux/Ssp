<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Poll System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .poll-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    .option {
      margin: 12px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }

    .results {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="poll-box">
    <h2>Vote Your Favorite</h2>

    <div class="option">
      <input type="radio" name="vote" value="Option A"> Option A
    </div>

    <div class="option">
      <input type="radio" name="vote" value="Option B"> Option B
    </div>

    <div class="option">
      <input type="radio" name="vote" value="Option C"> Option C
    </div>

    <button onclick="submitVote()">Submit Vote</button>

    <div class="results">
      <h3>Results</h3>
      <p>Option A: <span id="a">0</span></p>
      <p>Option B: <span id="b">0</span></p>
      <p>Option C: <span id="c">0</span></p>
    </div>
  </div>

  <script>
    let votes = {
      "Option A": 0,
      "Option B": 0,
      "Option C": 0
    };

    function submitVote() {
      let selected = document.querySelector('input[name="vote"]:checked');

      if (!selected) {
        alert("Please select an option!");
        return;
      }

      votes[selected.value]++;

      document.getElementById("a").innerText = votes["Option A"];
      document.getElementById("b").innerText = votes["Option B"];
      document.getElementById("c").innerText = votes["Option C"];
    }
  </script>

</body>
</html>
